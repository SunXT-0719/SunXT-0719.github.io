<div class="card reveal">
  <div class="card-title">留言板</div>

  <!-- Login area (shown when not logged in) -->
  <div class="msg-login" id="msgLogin">
    <p class="msg-login-hint">通过 GitHub 登录后即可留言，支持 Markdown 格式</p>
    <button class="msg-login-btn" id="msgLoginBtn">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
      使用 GitHub 登录
    </button>
  </div>

  <!-- User info (shown when logged in) -->
  <div class="msg-user" id="msgUser" style="display:none">
    <img class="msg-user-avatar" id="msgAvatar" src="" alt="">
    <span class="msg-user-name" id="msgUsername"></span>
    <button class="msg-logout-btn" id="msgLogoutBtn">登出</button>
  </div>

  <!-- Message input (shown when logged in) -->
  <div class="msg-input-area" id="msgInputArea" style="display:none">
    <div class="msg-input-tabs">
      <button class="msg-tab-btn active" data-mode="write">编辑</button>
      <button class="msg-tab-btn" data-mode="preview">预览</button>
    </div>
    <textarea class="msg-textarea" id="msgTextarea" placeholder="支持 Markdown 格式…&#10;&#10;**粗体** *斜体* `代码`&#10;- 列表&#10;> 引用&#10;[链接](url)"></textarea>
    <div class="msg-preview markdown-body" id="msgPreview" style="display:none"></div>
    <button class="msg-submit-btn" id="msgSubmitBtn" disabled>发送留言</button>
    <span class="msg-submit-hint" id="msgSubmitHint"></span>
  </div>

  <!-- Message list -->
  <div class="msg-list" id="msgList">
    <p class="msg-loading">加载留言中…</p>
  </div>
</div>
