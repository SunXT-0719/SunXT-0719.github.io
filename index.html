<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SunXT's Homepage</title>
  <link rel="icon" href="assets/images/avatar.jpg">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <!-- Top Bar -->
  <header class="top-bar">
    <span class="site-name">SunXT's Homepage</span>
  </header>

  <!-- Main Content -->
  <main class="main-container">
    <!-- Tab Navigation -->
    <nav class="tab-nav" role="tablist">
      <button class="tab-btn active" role="tab" id="tab-btn-about" data-tab="about" aria-selected="true" aria-controls="tab-about">个人简介</button>
      <button class="tab-btn" role="tab" id="tab-btn-blog" data-tab="blog" aria-selected="false" aria-controls="tab-blog">Blog</button>
    </nav>

    <!-- About Tab — Content loaded from sections/about.html -->
    <section class="tab-content active" id="tab-about" role="tabpanel" aria-labelledby="tab-btn-about"></section>

    <!-- Blog Tab — Content loaded from sections/blog.html -->
    <section class="tab-content" id="tab-blog" role="tabpanel" aria-labelledby="tab-btn-blog"></section>
  </main>

  <footer class="footer">
    <p>&copy; 2026 SunXT</p>
  </footer>

  <!-- Lightbox Overlay -->
  <div id="lightbox" class="lightbox">
    <img id="lightbox-img" src="" alt="头像大图">
  </div>

  <script src="assets/script.js"></script>
</body>
</html>
